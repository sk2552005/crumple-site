<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastilak — Squeeze & Spill</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <header class="hud">
      <h1>squeeze it<span class="dot">.</span></h1>
      <p class="sub">press and hold the bottle</p>
      <p class="counter">gummies spilled: <span id="count">0</span></p>
    </header>

    <canvas id="physicsCanvas"></canvas>

    <button id="bottleBtn" class="bottle-btn" aria-label="Squeeze the bottle">
      <img id="bottleImg" src="assets/bottle.png" alt="Pastilak Saffron Gummies bottle" />
    </button>

    <button id="resetBtn" class="reset-btn">tidy up</button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
