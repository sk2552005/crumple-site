<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crumple — live hand-tracked paper mesh</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">

    <header class="hud">
      <h1>crumple<span class="dot">.</span></h1>
      <p class="sub">pinch your thumb + ring finger together — the mesh folds live, no pre-rendered video</p>
    </header>

    <!-- Live WebGL mesh: your image mapped onto a triangulated plane that
         actually deforms in real time based on your hand. -->
    <div class="portrait-wrap">
      <canvas id="glCanvas"></canvas>

      <label class="upload-btn" for="imgInput">upload your cutout photo (PNG, transparent bg works best)</label>
      <input type="file" id="imgInput" accept="image/*" hidden />
    </div>

    <!-- Webcam preview + hand skeleton -->
    <div class="cam-pip">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="camStatus" class="cam-status">starting camera…</div>
    </div>

    <div class="readout">
      <div class="readout-row">
        <span>crumple amount</span>
        <div class="bar"><div id="crumpleBar" class="bar-fill"></div></div>
      </div>
    </div>

  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
